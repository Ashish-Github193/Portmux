repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/PyCQA/bandit
    rev: "1.8.3"
    hooks:
      - id: bandit
        args: [-r, src/portmux/, --exclude, tests, -s, "B404,B603,B607"]
        pass_filenames: false

  - repo: local
    hooks:
      - id: vulture
        name: vulture (informational)
        entry: bash -c 'vulture src/portmux/ --min-confidence 80 || true'
        language: system
        types: [python]
        pass_filenames: false
        verbose: true
